[pytest]
# 使用importlib导入模式避免conftest冲突
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib
    -p no:warnings

markers =
    smoke: 冒烟测试（快速验证核心功能）
    requires_api: 需要API Key的测试
    slow: 慢速测试（执行时间>5秒）
    integration: 集成测试
    unit: 单元测试

# 测试发现配置
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 最小Python版本
minversion = 7.0
