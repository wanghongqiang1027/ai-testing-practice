[pytest]
# Markers
markers =
    smoke: 核心冒烟测试（快速验证）
    regression: 回归测试
    slow: 耗时较长的测试
    security: 安全测试
    prompt: Prompt 测试
    rag: RAG 测试
    agent: Agent 测试
    cost: 成本相关测试
    performance: 性能测试

# Test paths
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Timeout
timeout = 300
timeout_method = thread

# Coverage
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
